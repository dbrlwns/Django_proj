{% extends 'base1.html' %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-md-4 col-lg-4">

            <div class="card shadow-sm border border-secondary border-opacity-25 rounded-4">
                <div class="card-body p-4">

                    <h3 class="text-center mb-4 fw-bold">Login</h3>

                    <form method="POST" action="">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text"
                                   name="username"
                                   class="form-control rounded-pill"
                                   autofocus="autofocus"
                                   placeholder="Enter username">
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password"
                                   name="password"
                                   class="form-control rounded-pill"
                                   autocomplete="off"
                                   placeholder="Enter password">
                        </div>

                        <div class="d-flex justify-content-between">
                            <a href="{% url 'post_list' %}" class="btn btn-outline-secondary rounded-pill">
                                cancle
                            </a>
                            <button type="submit"
                                    class="btn btn-primary rounded-pill">
                                Login
                            </button>
                        </div>

                    </form>

                </div>
                {% if messages %}   <!-- view에서 messages.error로 에러  -->
                    {% for message in messages %}
                        {% if forloop.last %}   <!-- forloop.last로 마지막 하나만 출력 -->
                        <div class="alert alert-danger alert-{{ message.tags }}">
                            {{ message }}
                        </div>
                        {% endif %}
                    {% endfor %}
                {% endif %}
            </div>

        </div>
    </div>
</div>
{% endblock %}
