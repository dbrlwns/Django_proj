<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Django</title>
</head>
<body>

        {% if user.is_authenticated %}
            hello, {{ user.username }}
            <a href="{% url 'user_logout' %}">Logout</a>

        {% endif %}

    {% block content %}{% endblock %}
</body>
</html>
