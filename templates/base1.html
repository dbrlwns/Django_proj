<script>
    (function () {
    const toggleButton = document.getElementById("theme-toggle")

    // Function to set the theme on the htm_l element
    function setTheme(theme) {
        document.documentElement.setAttribute('data-bs-theme', theme);
    }

    // Function to toggle between light and dark
    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-bs-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        setTheme(newTheme);
        // Optional: Save user preference in localStorage
        localStorage.setItem('theme', newTheme);
    }

    // Event listener for the button
    if (toggleButton) {
        toggleButton.addEventListener('click', toggleTheme);
    }

    // Optional: Load saved theme from localStorage or default to system preference
    const savedTheme = localStorage.getItem('theme');
    const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialTheme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
    setTheme(initialTheme);
    })();
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {

    const csrftoken = getCookie('csrftoken');

    document.querySelectorAll('.like-btn').forEach(button => {

        button.addEventListener('click', function () {

            const postId = this.dataset.id; // button 태그에 data-id="{{ post.id }}"

            fetch(`/like/${postId}/`, {
                method: 'POST',
                headers: {
                    'X-CSRFToken': csrftoken,
                    'Content-Type': 'application/json',
                },
            })
            .then(response => response.json())
            .then(data => {

                this.querySelector('.like-count').innerText = data.count;

                if (data.liked) {
                    this.classList.remove('btn-outline-danger');
                    this.classList.add('btn-danger');
                } else {
                    this.classList.remove('btn-danger');
                    this.classList.add('btn-outline-danger');
                }

            });

        });

    });

});
</script>
<script>
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
